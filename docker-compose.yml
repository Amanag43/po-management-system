
services:

  # ── MAIN BACKEND ──────────────────────────────────
  backend:
    build: ./backend          # build from backend/Dockerfile
    container_name: po-backend
    ports:
      - "5000:5000"           # host:container port mapping
    environment:
      # These override .env file
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - notification    # start notifications first
    restart: unless-stopped   # auto restart if crashes
    networks:
      - po-network

  # ── NOTIFICATION SERVER ───────────────────────────
  notification:
    build: ./notification
    container_name: po-notification
    ports:
      - "5001:5001"
    restart: unless-stopped
    networks:
      - po-network

# ── NETWORK ───────────────────────────────────────────
# Containers can talk to each other using service names
# backend can call: http://notifications:5001
networks:
  po-network:
    driver: bridge