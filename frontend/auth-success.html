<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authenticating...</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p { color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>

  <div class="spinner"></div>
  <p>Signing you in...</p>

  <script>
    // This page receives the JWT token from backend redirect
    // URL looks like: /auth-success.html?token=eyJhbGci...

    // STEP 1: Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (token) {
      // STEP 2: Save token to localStorage
      // localStorage persists across page refreshes
      localStorage.setItem('po_token', token);

      // STEP 3: Redirect to dashboard
      window.location.href = 'dashboard.html';

    } else {
      // No token = auth failed
      window.location.href = 'index.html?error=auth_failed';
    }
  </script>

</body>
</html>
