<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — PO Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-hover: #263548;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      color: var(--text);
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── MAIN LAYOUT ── */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
    }

    .page-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 2px;
    }

    /* ── STATS CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-bottom: 12px;
    }

    /* ── FILTERS ── */
    .filters-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 240px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-input::placeholder { color: var(--text-muted); }

    /* ── TABLE ── */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .po-table {
      width: 100%;
      border-collapse: collapse;
    }

    .po-table th {
      background: var(--bg);
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .po-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .po-table tr:last-child td { border-bottom: none; }

    .po-table tbody tr:hover {
      background: var(--bg-hover);
      cursor: pointer;
    }

    /* ── STATUS BADGES ── */
    .badge-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-pending  { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-approved { background: rgba(34,197,94,0.15);  color: #22c55e; }
    .badge-ordered  { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .badge-received { background: rgba(168,85,247,0.15); color: #a855f7; }
    .badge-cancelled{ background: rgba(239,68,68,0.15);  color: #ef4444; }

    /* ── ACTION BUTTONS ── */
    .btn-action {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-action:hover {
      background: var(--primary);
      border-color: var(--primary);
    }

    .btn-primary-sm {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      text-decoration: none;
    }

    .btn-primary-sm:hover {
      background: #1d4ed8;
      color: white;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    .spinner-sm {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── MODAL ── */
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
    }

    .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }

    .modal-body { padding: 20px; }
    .modal-footer {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
    }

    .btn-close { filter: invert(1); }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-muted); }

    /* ── LOGOUT BTN ── */
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-logout:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <div class="brand-icon">📦</div>
      PO Management
    </a>
    <div class="nav-actions">
      <div class="user-badge">
        <div class="user-avatar" id="userInitial">?</div>
        <span id="userName">Loading...</span>
      </div>
      <button class="btn-logout" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main-container">

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Purchase Orders</h1>
        <p class="page-subtitle">Manage and track all your procurement orders</p>
      </div>
      <a href="create_po.html" class="btn-primary-sm">
        <i class="bi bi-plus-lg"></i> New Purchase Order
      </a>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(37,99,235,0.15)">📋</div>
        <div class="stat-label">Total POs</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(245,158,11,0.15)">⏳</div>
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending" style="color:#f59e0b">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(34,197,94,0.15)">✅</div>
        <div class="stat-label">Approved</div>
        <div class="stat-value" id="statApproved" style="color:#22c55e">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(168,85,247,0.15)">📦</div>
        <div class="stat-label">Received</div>
        <div class="stat-value" id="statReceived" style="color:#a855f7">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input
        type="text"
        class="search-input"
        placeholder="🔍 Search by reference no..."
        id="searchInput"
        oninput="filterPOs()"
      >
      <select class="filter-select" id="statusFilter" onchange="loadPOs()">
        <option value="">All Statuses</option>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
        <option value="Ordered">Ordered</option>
        <option value="Received">Received</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div id="tableContent">
        <div class="loading">
          <div class="spinner-sm"></div>
          <p>Loading purchase orders...</p>
        </div>
      </div>
    </div>

  </div>

  <!-- PO Detail Modal -->
  <div class="modal fade" id="poModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Purchase Order Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalBody">
          Loading...
        </div>
        <div class="modal-footer">
          <select class="filter-select" id="statusUpdate">
            <option value="">Update Status...</option>
            <option value="Approved">Approve</option>
            <option value="Ordered">Mark as Ordered</option>
            <option value="Received">Mark as Received</option>
            <option value="Cancelled">Cancel</option>
          </select>
          <button class="btn-primary-sm" onclick="updateStatus()">
            <i class="bi bi-check-lg"></i> Update
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script>
    // ── CONSTANTS ──────────────────────────────────────
    const API = 'http://localhost:5000';
    const token = localStorage.getItem('po_token');
    let allPOs = [];       // stores all POs for client-side filtering
    let currentPOId = null; // tracks which PO modal is open

    // ── AUTH HEADERS ───────────────────────────────────
    // Every API call needs this header with our JWT token
    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
    }

    // ── REDIRECT IF NOT LOGGED IN ──────────────────────
    if (!token) {
      window.location.href = 'index.html';
    }

    // ── LOAD USER INFO ─────────────────────────────────
    async function loadUser() {
      try {
        const res = await fetch(`${API}/auth/success`, {
          headers: authHeaders()
        });
        const data = await res.json();

        if (data.success) {
          // Show user name in navbar
          document.getElementById('userName').textContent = data.data.name;
          // Show first letter of name as avatar
          document.getElementById('userInitial').textContent =
            data.data.name.charAt(0).toUpperCase();
        }
      } catch (err) {
        console.error('Failed to load user:', err);
      }
    }

    // ── LOAD ALL POs ───────────────────────────────────
    async function loadPOs() {
      const status = document.getElementById('statusFilter').value;
      const url = status
        ? `${API}/api/purchase-orders?status=${status}`
        : `${API}/api/purchase-orders`;

      // Show loading state
      document.getElementById('tableContent').innerHTML = `
        <div class="loading">
          <div class="spinner-sm"></div>
          <p>Loading...</p>
        </div>
      `;

      try {
        const res = await fetch(url, { headers: authHeaders() });
        const data = await res.json();

        if (data.success) {
          allPOs = data.data;
          updateStats(allPOs);
          renderTable(allPOs);
        }
      } catch (err) {
        document.getElementById('tableContent').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <p>Failed to load purchase orders</p>
          </div>
        `;
      }
    }

    // ── UPDATE STATS CARDS ─────────────────────────────
    function updateStats(pos) {
      document.getElementById('statTotal').textContent = pos.length;
      document.getElementById('statPending').textContent =
        pos.filter(p => p.status === 'Pending').length;
      document.getElementById('statApproved').textContent =
        pos.filter(p => p.status === 'Approved').length;
      document.getElementById('statReceived').textContent =
        pos.filter(p => p.status === 'Received').length;
    }

    // ── RENDER TABLE ───────────────────────────────────
    function renderTable(pos) {
      if (pos.length === 0) {
        document.getElementById('tableContent').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>No purchase orders found</p>
            <a href="create_po.html" class="btn-primary-sm" style="margin-top:16px;display:inline-flex">
              + Create First PO
            </a>
          </div>
        `;
        return;
      }

      // Build table HTML
      let html = `
        <table class="po-table">
          <thead>
            <tr>
              <th>Reference No</th>
              <th>Vendor</th>
              <th>Subtotal</th>
              <th>Tax (5%)</th>
              <th>Total</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
      `;

      pos.forEach(po => {
        // Format date nicely
        const date = new Date(po.createdAt).toLocaleDateString('en-IN', {
          day: 'numeric', month: 'short', year: 'numeric'
        });

        html += `
          <tr onclick="viewPO(${po.id})">
            <td><strong>${po.referenceNo || po.reference_no}</strong></td>
            <td>${po.vendor ? po.vendor.name : '—'}</td>
            <td>$${parseFloat(po.subtotal).toFixed(2)}</td>
            <td>$${parseFloat(po.tax_amount || po.taxAmount).toFixed(2)}</td>
            <td><strong>$${parseFloat(po.total_amount || po.totalAmount).toFixed(2)}</strong></td>
            <td><span class="badge-status badge-${po.status.toLowerCase()}">${po.status}</span></td>
            <td style="color:var(--text-muted)">${date}</td>
            <td>
              <button class="btn-action" onclick="event.stopPropagation(); viewPO(${po.id})">
                <i class="bi bi-eye"></i> View
              </button>
            </td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      document.getElementById('tableContent').innerHTML = html;
    }

    // ── FILTER POs (CLIENT SIDE) ───────────────────────
    function filterPOs() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allPOs.filter(po => {
        const refNo = (po.referenceNo || po.reference_no || '').toLowerCase();
        return refNo.includes(search);
      });
      renderTable(filtered);
    }

    // ── VIEW PO DETAILS ────────────────────────────────
    async function viewPO(id) {
      currentPOId = id;

      // Show modal with loading state
      document.getElementById('modalBody').innerHTML = `
        <div class="loading"><div class="spinner-sm"></div><p>Loading...</p></div>
      `;

      const modal = new bootstrap.Modal(document.getElementById('poModal'));
      modal.show();

      try {
        const res = await fetch(`${API}/api/purchase-orders/${id}`, {
          headers: authHeaders()
        });
        const data = await res.json();

        if (data.success) {
          const po = data.data;
          document.getElementById('modalTitle').textContent =
            `PO: ${po.referenceNo || po.reference_no}`;

          // Build modal content
          let itemsHtml = '';
          if (po.items && po.items.length > 0) {
            itemsHtml = `
              <table class="po-table" style="margin-top:8px">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Line Total</th>
                  </tr>
                </thead>
                <tbody>
                  ${po.items.map(item => `
                    <tr>
                      <td>${item.product ? item.product.name : 'N/A'}</td>
                      <td style="color:var(--text-muted)">${item.product ? item.product.sku : ''}</td>
                      <td>${item.quantity}</td>
                      <td>$${parseFloat(item.unitPrice || item.unit_price).toFixed(2)}</td>
                      <td><strong>$${parseFloat(item.lineTotal || item.line_total).toFixed(2)}</strong></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            `;
          }

          document.getElementById('modalBody').innerHTML = `
            <div class="detail-row">
              <span class="detail-label">Reference No</span>
              <strong>${po.referenceNo || po.reference_no}</strong>
            </div>
            <div class="detail-row">
              <span class="detail-label">Vendor</span>
              <span>${po.vendor ? po.vendor.name : '—'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Status</span>
              <span class="badge-status badge-${po.status.toLowerCase()}">${po.status}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Subtotal</span>
              <span>$${parseFloat(po.subtotal).toFixed(2)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Tax (5%)</span>
              <span>$${parseFloat(po.tax_amount || po.taxAmount).toFixed(2)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Total Amount</span>
              <strong style="color:var(--success)">
                $${parseFloat(po.total_amount || po.totalAmount).toFixed(2)}
              </strong>
            </div>
            ${po.notes ? `
            <div class="detail-row">
              <span class="detail-label">Notes</span>
              <span>${po.notes}</span>
            </div>` : ''}
            <h6 style="margin-top:20px;margin-bottom:8px;color:var(--text-muted);font-size:12px;text-transform:uppercase">
              Line Items
            </h6>
            ${itemsHtml || '<p style="color:var(--text-muted);font-size:13px">No items found</p>'}
          `;
        }
      } catch (err) {
        document.getElementById('modalBody').innerHTML =
          '<p style="color:var(--danger)">Failed to load PO details</p>';
      }
    }

    // ── UPDATE PO STATUS ───────────────────────────────
    async function updateStatus() {
      const status = document.getElementById('statusUpdate').value;

      if (!status) {
        alert('Please select a status first');
        return;
      }

      try {
        const res = await fetch(
          `${API}/api/purchase-orders/${currentPOId}/status`,
          {
            method: 'PATCH',
            headers: authHeaders(),
            body: JSON.stringify({ status })
          }
        );

        const data = await res.json();

        if (data.success) {
          // Close modal and reload table
          bootstrap.Modal.getInstance(
            document.getElementById('poModal')
          ).hide();
          loadPOs();
          alert(`✅ PO status updated to ${status}`);
        } else {
          alert(`❌ Error: ${data.error}`);
        }
      } catch (err) {
        alert('Failed to update status');
      }
    }

    // ── LOGOUT ─────────────────────────────────────────
    function logout() {
      localStorage.removeItem('po_token');
      window.location.href = 'index.html';
    }

    // ── INITIALIZE ─────────────────────────────────────
    loadUser();
    loadPOs();
  </script>
  <!-- Socket.io Client Library -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
  // ── SOCKET.IO CONNECTION ───────────────────────────
  // Connect to our notification server on port 5001
  const socket = io('http://localhost:5001');

  // ── NOTIFICATION STYLES ────────────────────────────
  const notifStyles = `
    #notif-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 360px;
    }
    .notif-toast {
      background: #1e293b;
      border: 1px solid #334155;
      border-left: 4px solid #2563eb;
      border-radius: 10px;
      padding: 14px 16px;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
      cursor: pointer;
    }
    .notif-toast:hover { border-left-color: #22c55e; }
    .notif-title {
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .notif-time {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100%); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(100%); }
    }
  `;

  // Inject styles
  const styleEl = document.createElement('style');
  styleEl.textContent = notifStyles;
  document.head.appendChild(styleEl);

  // Create notification container
  const container = document.createElement('div');
  container.id = 'notif-container';
  document.body.appendChild(container);

  // ── STATUS COLOR MAP ───────────────────────────────
  const statusColors = {
    'Approved':  '#22c55e',
    'Ordered':   '#3b82f6',
    'Received':  '#a855f7',
    'Cancelled': '#ef4444',
    'Pending':   '#f59e0b'
  };

  // ── SHOW NOTIFICATION ──────────────────────────────
  function showNotification(data) {
    const color = statusColors[data.newStatus] || '#2563eb';
    const time = new Date(data.timestamp).toLocaleTimeString();

    const toast = document.createElement('div');
    toast.className = 'notif-toast';
    toast.style.borderLeftColor = color;

    toast.innerHTML = `
      <div class="notif-title">
        🔔 PO Status Updated
      </div>
      <div>${data.message}</div>
      <div class="notif-time">${time}</div>
    `;

    // Click to dismiss
    toast.onclick = () => toast.remove();

    container.appendChild(toast);

    // Auto dismiss after 5 seconds
    setTimeout(() => {
      toast.style.animation = 'slideOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);

      // Reload POs table to show updated status
      loadPOs();
    }, 5000);
  }

  // ── LISTEN FOR NOTIFICATIONS ───────────────────────
  // This fires every time backend emits 'po-notification'
  socket.on('po-notification', (data) => {
    console.log('Notification received:', data);
    showNotification(data);
  });

  // ── CONNECTION STATUS ──────────────────────────────
  socket.on('connect', () => {
    console.log('🔔 Connected to notification server');
  });

  socket.on('disconnect', () => {
    console.log('Disconnected from notification server');
  });
</script>

</body>
</html>
